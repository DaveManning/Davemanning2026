<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Mob Design System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: move;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="instructions">Move mouse to control pan • Auto-scrolls when idle</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 5);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight1.position.set(3, 3, 4);
        scene.add(directionalLight1);
        
        const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        directionalLight2.position.set(-3, -2, -2);
        scene.add(directionalLight2);
        
        const rimLight = new THREE.PointLight(0x4a9eff, 0.2);
        rimLight.position.set(0, 0, -2);
        scene.add(rimLight);
        
        // iPad group
        const ipadGroup = new THREE.Group();
        scene.add(ipadGroup);
        
        const ipadWidth = 3.2;
        const ipadHeight = 4.3;
        const ipadDepth = 0.03;
        const bezelSize = 0.08;
        
        // IMPORTANT: Replace with your hosted image URL
        const textureLoader = new THREE.TextureLoader();
        const designSystemTexture = textureLoader.load('https://cdn.prod.website-files.com/665dc6d404f483159d229613/69dd94372e711021b90a5fbf_Design%20System.png');
        designSystemTexture.minFilter = THREE.LinearFilter;
        designSystemTexture.magFilter = THREE.LinearFilter;
        
        // iPad body
        const bezelGeometry = new THREE.BoxGeometry(ipadWidth, ipadHeight, ipadDepth);
        const bezelMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            metalness: 0.8,
            roughness: 0.2,
        });
        const bezelMesh = new THREE.Mesh(bezelGeometry, bezelMaterial);
        ipadGroup.add(bezelMesh);
        
        // Screen with scrollable shader
        const screenWidth = ipadWidth - bezelSize * 2;
        const screenHeight = ipadHeight - bezelSize * 2;
        
        const screenGeometry = new THREE.PlaneGeometry(screenWidth, screenHeight);
        const screenMaterial = new THREE.ShaderMaterial({
            uniforms: {
                texture: { value: designSystemTexture },
                scrollOffset: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D texture;
                uniform float scrollOffset;
                varying vec2 vUv;
                
                void main() {
                    vec2 uv = vUv;
                    uv.y = uv.y * 0.4 + scrollOffset;
                    
                    if (uv.y < 0.0 || uv.y > 1.0) {
                        gl_FragColor = vec4(1.0, 1.0, 1.0, 1.0);
                    } else {
                        gl_FragColor = texture2D(texture, uv);
                    }
                }
            `
        });
        
        const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
        screenMesh.position.z = ipadDepth / 2 + 0.001;
        ipadGroup.add(screenMesh);
        
        // Drop shadow
        const shadowGeometry = new THREE.PlaneGeometry(ipadWidth + 0.1, ipadHeight + 0.1);
        const shadowMaterial = new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.15
        });
        const shadowMesh = new THREE.Mesh(shadowGeometry, shadowMaterial);
        shadowMesh.position.z = -ipadDepth / 2 - 0.05;
        ipadGroup.add(shadowMesh);
        
        ipadGroup.rotation.x = 0.1;
        
        // State
        let mouseX = 0;
        let mouseY = 0.5;
        let targetRotationX = 0.1;
        let targetRotationY = 0;
        let currentRotationX = 0.1;
        let currentRotationY = 0;
        let targetScroll = 0;
        let currentScroll = 0;
        let time = 0;
        let isUserControlling = false;
        let idleTimer = 0;
        const IDLE_TIMEOUT = 3;
        const AUTO_SCROLL_SPEED = 0.6 / 30;
        
        container.addEventListener('mousemove', (event) => {
            const rect = container.getBoundingClientRect();
            mouseX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouseY = ((event.clientY - rect.top) / rect.height) * 2 - 1;
            
            isUserControlling = true;
            idleTimer = 0;
            
            targetScroll = THREE.MathUtils.clamp(-mouseY * 0.5 + 0.3, 0, 0.6);
            targetRotationY = mouseX * 0.15;
        });
        
        container.addEventListener('mouseleave', () => {
            isUserControlling = false;
        });
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            if (isUserControlling) {
                idleTimer += 0.016;
                if (idleTimer > IDLE_TIMEOUT) {
                    isUserControlling = false;
                }
            }
            
            if (!isUserControlling) {
                targetScroll = (Math.sin(time * AUTO_SCROLL_SPEED) * 0.5 + 0.5) * 0.6;
                targetRotationY = Math.sin(time * 0.1) * 0.05;
            }
            
            currentRotationX += (targetRotationX - currentRotationX) * 0.05;
            currentRotationY += (targetRotationY - currentRotationY) * 0.05;
            currentScroll += (targetScroll - currentScroll) * 0.08;
            
            ipadGroup.rotation.x = currentRotationX;
            ipadGroup.rotation.y = currentRotationY;
            
            screenMaterial.uniforms.scrollOffset.value = currentScroll;
            
            ipadGroup.position.y = Math.sin(time * 0.5) * 0.02;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
