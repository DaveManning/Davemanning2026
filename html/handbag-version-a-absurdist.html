<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Handbag AR - Absurdist Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
            font-family: 'Playfair Display', serif;
        }
        
        #canvas-container {
            position: relative;
            width: 100%;
            height: 600px;
            min-height: 600px;
            z-index: 10;
            pointer-events: auto;
        }
        
        #main-headline {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 56px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 40px rgba(255, 215, 0, 0.6),
                2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: fadeInGlow 2s ease forwards;
            letter-spacing: 3px;
        }
        
        @keyframes fadeInGlow {
            to { opacity: 1; }
        }
        
        #subtext {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 18px;
            font-style: italic;
            opacity: 0;
            animation: fadeInGlow 2s 0.5s ease forwards;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }
        
        #price-tag {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a1a1a;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            opacity: 0;
            animation: fadeInGlow 2s 1s ease forwards;
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.8),
                0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        #flex-cta {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 14px;
            opacity: 0;
            animation: fadeInGlow 2s 1.5s ease forwards;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }
        
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 10px #FFD700;
            animation: sparkle 2s infinite;
            pointer-events: none;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="main-headline">👑 PEASANTS LOOK AWAY 👑</div>
    <div id="subtext">This costs one student loan payment</div>
    <div id="price-tag">💸 Worth More Than Your Rent 💸</div>
    <div id="flex-cta">Screenshot to flex on your group chat</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
function init3DScene() {
        // Scene setup
        const scene = new THREE.Scene();
        
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(
            50,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // DRAMATIC lighting (over the top)
        const ambientLight = new THREE.AmbientLight(0xffd700, 0.4);
        scene.add(ambientLight);
        
        // Spotlight from heaven
        const spotlight = new THREE.SpotLight(0xffffff, 2);
        spotlight.position.set(0, 20, 0);
        spotlight.angle = Math.PI / 6;
        spotlight.penumbra = 0.3;
        spotlight.castShadow = true;
        scene.add(spotlight);
        
        // Gold rim lights
        const rimLight1 = new THREE.PointLight(0xffd700, 1);
        rimLight1.position.set(5, 3, 5);
        scene.add(rimLight1);
        
        const rimLight2 = new THREE.PointLight(0xffa500, 1);
        rimLight2.position.set(-5, 3, -5);
        scene.add(rimLight2);
        
        // Handbag group
        const handbagGroup = new THREE.Group();
        scene.add(handbagGroup);
        
        // Load handbag model (handbag2.gltf)
        // IMPORTANT: Replace with your hosted GLTF URL
        const loader = new THREE.GLTFLoader();
        let handbagModel = null;
        
        loader.load(
            'https://davemanning.github.io/Davemanning2026/assets/models/handbag2.gltf',
            function (gltf) {
                handbagModel = gltf.scene;
                
                // Make it LUXURIOUS
                handbagModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0x8B4513,
                            metalness: 0.3,
                            roughness: 0.4,
                            envMapIntensity: 1.5
                        });
                    }
                });
                
                // Scale
                const box = new THREE.Box3().setFromObject(handbagModel);
                const size = box.getSize(new THREE.Vector3());
                const scale = 4 / Math.max(size.x, size.y, size.z);
                handbagModel.scale.multiplyScalar(scale);
                
                // Center
                const center = box.getCenter(new THREE.Vector3());
                handbagModel.position.sub(center.multiplyScalar(scale));
                
                handbagGroup.add(handbagModel);
            },
            undefined,
            function (error) {
                console.error('Error loading handbag:', error);
                // Placeholder
                const geometry = new THREE.BoxGeometry(2, 3, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x8B4513,
                    metalness: 0.3,
                    roughness: 0.4
                });
                const placeholder = new THREE.Mesh(geometry, material);
                handbagGroup.add(placeholder);
            }
        );
        
        // Particle system - EXCESSIVE gold sparkles
        const particleCount = 500;
        const particles = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];
        
        for (let i = 0; i < particleCount; i++) {
            const radius = 5 + Math.random() * 3;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            
            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.cos(phi);
            positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
            
            velocities.push({
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.02,
                z: (Math.random() - 0.5) * 0.02
            });
        }
        
        particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: 0xFFD700,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        
        const particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);
        
        // Create sparkles in HTML
        function createSparkles() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = Math.random() * window.innerWidth + 'px';
                    sparkle.style.top = Math.random() * window.innerHeight + 'px';
                    sparkle.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 4000);
                }, i * 200);
            }
        }
        
        createSparkles();
        setInterval(createSparkles, 5000);
        
        // Animation
        let time = 0;
        let mouseX = 0;
        let mouseY = 0;
        
        container.addEventListener('mousemove', (event) => {
            const rect = container.getBoundingClientRect();
            mouseX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouseY = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        });
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Rotate handbag dramatically
            handbagGroup.rotation.y = time * 0.5 + mouseX * 0.3;
            handbagGroup.rotation.x = Math.sin(time * 0.3) * 0.2;
            
            // Floating
            handbagGroup.position.y = Math.sin(time) * 0.5;
            
            // Update particles
            const positions = particles.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += velocities[i].x;
                positions[i * 3 + 1] += velocities[i].y;
                positions[i * 3 + 2] += velocities[i].z;
                
                // Reset if too far
                const dist = Math.sqrt(
                    positions[i * 3] ** 2 + 
                    positions[i * 3 + 1] ** 2 + 
                    positions[i * 3 + 2] ** 2
                );
                if (dist > 10) {
                    const radius = 5;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = radius * Math.cos(phi);
                    positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
                }
            }
            particles.attributes.position.needsUpdate = true;
            
            // Pulse spotlight
            spotlight.intensity = 1.5 + Math.sin(time * 2) * 0.5;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
}

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting && !window.sceneInitialized) {
            window.sceneInitialized = true;
            init3DScene();
            observer.disconnect();
        }
    });
}, { threshold: 0.1 });

observer.observe(document.getElementById('canvas-container'));
    </script>
</body>
</html>
