<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Truck Digital Twin - Axle Monitoring</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
            font-family: 'Courier New', monospace;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .data-point {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.4);
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        
        .metric {
            position: absolute;
            background: rgba(0, 20, 40, 0.9);
            color: #00ffff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .metric.visible {
            opacity: 1;
        }
        
        #oee-dashboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 20, 40, 0.95);
            color: #00ffff;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 12px;
            line-height: 1.6;
        }
        
        #oee-dashboard h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #00ffff;
        }
        
        .oee-metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .oee-value {
            color: #10B981;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="oee-dashboard">
        <h3>OEE METRICS</h3>
        <div class="oee-metric">
            <span>Availability:</span>
            <span class="oee-value">94.2%</span>
        </div>
        <div class="oee-metric">
            <span>Performance:</span>
            <span class="oee-value">96.8%</span>
        </div>
        <div class="oee-metric">
            <span>Quality:</span>
            <span class="oee-value">99.3%</span>
        </div>
        <div style="border-top: 1px solid rgba(0, 255, 255, 0.3); margin-top: 8px; padding-top: 8px;">
            <div class="oee-metric">
                <span>Overall OEE:</span>
                <span class="oee-value">90.5%</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Lighting - tech/digital twin aesthetic
        const ambientLight = new THREE.AmbientLight(0x0a1928, 0.5);
        scene.add(ambientLight);
        
        const keyLight = new THREE.DirectionalLight(0x00ffff, 0.8);
        keyLight.position.set(5, 5, 5);
        scene.add(keyLight);
        
        const fillLight = new THREE.PointLight(0x00ffff, 0.4);
        fillLight.position.set(-5, 3, -3);
        scene.add(fillLight);
        
        // Axle group
        const axleGroup = new THREE.Group();
        scene.add(axleGroup);
        
        // Load truck axle GLTF
        // IMPORTANT: Replace with your hosted GLTF URL
        const loader = new THREE.GLTFLoader();
        let axleModel = null;
        
        loader.load(
            '../assets/models/atlasTruck-Truck005.gltf',
            function (gltf) {
                axleModel = gltf.scene;
                
                // Apply tech/digital twin material
                axleModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0x2a4a5a,
                            metalness: 0.8,
                            roughness: 0.3,
                            emissive: 0x004466,
                            emissiveIntensity: 0.2
                        });
                    }
                });
                
                // Scale to reasonable size
                const box = new THREE.Box3().setFromObject(axleModel);
                const size = box.getSize(new THREE.Vector3());
                const scale = 5 / Math.max(size.x, size.y, size.z);
                axleModel.scale.multiplyScalar(scale);
                
                // Center it
                const center = box.getCenter(new THREE.Vector3());
                axleModel.position.sub(center.multiplyScalar(scale));
                
                axleGroup.add(axleModel);
                
                // Add sensor data points after model loads
                createSensorPoints();
            },
            undefined,
            function (error) {
                console.error('Error loading axle model:', error);
                // Create placeholder if model fails
                const geometry = new THREE.CylinderGeometry(0.5, 0.5, 4, 16);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x2a4a5a,
                    metalness: 0.8,
                    roughness: 0.3
                });
                const placeholder = new THREE.Mesh(geometry, material);
                placeholder.rotation.z = Math.PI / 2;
                axleGroup.add(placeholder);
                createSensorPoints();
            }
        );
        
        // Holographic wireframe overlay
        const wireframeGeometry = new THREE.CylinderGeometry(0.55, 0.55, 4.2, 16, 1, true);
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const wireframeMesh = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
        wireframeMesh.rotation.z = Math.PI / 2;
        axleGroup.add(wireframeMesh);
        
        // Scan line effect
        const scanLineGeometry = new THREE.PlaneGeometry(8, 0.1);
        const scanLineMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide
        });
        const scanLine = new THREE.Mesh(scanLineGeometry, scanLineMaterial);
        scene.add(scanLine);
        
        // Create sensor data points in HTML
        function createSensorPoints() {
            const sensorLocations = [
                { x: '20%', y: '30%' },
                { x: '35%', y: '45%' },
                { x: '50%', y: '40%' },
                { x: '65%', y: '55%' },
                { x: '80%', y: '35%' },
                { x: '25%', y: '60%' },
                { x: '45%', y: '65%' },
                { x: '60%', y: '70%' },
                { x: '75%', y: '50%' },
                { x: '85%', y: '65%' },
                { x: '30%', y: '25%' },
                { x: '70%', y: '25%' }
            ];
            
            sensorLocations.forEach((loc, i) => {
                const point = document.createElement('div');
                point.className = 'data-point';
                point.style.left = loc.x;
                point.style.top = loc.y;
                point.style.animationDelay = `${i * 0.15}s`;
                container.appendChild(point);
            });
        }
        
        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0.2;
        let targetRotationY = 0;
        let currentRotationX = 0.2;
        let currentRotationY = 0;
        
        container.addEventListener('mousemove', (event) => {
            const rect = container.getBoundingClientRect();
            mouseX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouseY = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            targetRotationY = mouseX * 0.5;
            targetRotationX = 0.2 + mouseY * 0.3;
        });
        
        container.addEventListener('mouseleave', () => {
            targetRotationY = 0;
            targetRotationX = 0.2;
        });
        
        // Animation loop
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Smooth interpolation
            currentRotationX += (targetRotationX - currentRotationX) * 0.05;
            currentRotationY += (targetRotationY - currentRotationY) * 0.05;
            
            axleGroup.rotation.x = currentRotationX;
            axleGroup.rotation.y = currentRotationY + time * 0.1;
            
            // Animate scan line
            scanLine.position.y = Math.sin(time * 2) * 3;
            scanLine.rotation.x = Math.PI / 2;
            
            // Pulse wireframe
            wireframeMaterial.opacity = 0.2 + Math.sin(time * 3) * 0.1;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
