<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsar Digital Dashboard - iPhone View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        #canvas-container {
            position: relative;
            width: 100%;
            height: 600px;
            min-height: 600px;
            z-index: 10;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
(function() {
function init3DScene() {
        // Scene setup
        const scene = new THREE.Scene();
        
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);
        
        const rimLight = new THREE.PointLight(0x4a9eff, 0.3);
        rimLight.position.set(-3, -2, -2);
        scene.add(rimLight);
        
        // iPhone group
        const phoneGroup = new THREE.Group();
        scene.add(phoneGroup);
        
        // iPhone body dimensions (iPhone 14 Pro proportions)
        const phoneWidth = 1.8;
        const phoneHeight = 3.9;
        const phoneDepth = 0.2;
        const screenInset = 0.08;
        const cornerRadius = 0.25;
        
        // Phone body (bezel)
        const bodyGeometry = new THREE.BoxGeometry(phoneWidth, phoneHeight, phoneDepth);
        const bodyMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            metalness: 0.8,
            roughness: 0.2,
        });
        const phoneMesh = new THREE.Mesh(bodyGeometry, bodyMaterial);
        phoneGroup.add(phoneMesh);
        
        // Screen area
        const screenWidth = phoneWidth - screenInset * 2;
        const screenHeight = phoneHeight - screenInset * 2;
        
        // Load dashboard texture
        // IMPORTANT: Replace with your hosted dashboard image URL
        const textureLoader = new THREE.TextureLoader();
        const dashboardTexture = textureLoader.load('https://cdn.prod.website-files.com/665dc6d404f483159d229613/69dd2d82176aa261e116f2a8_pulsar-dashboard.png');
        dashboardTexture.minFilter = THREE.LinearFilter;
        dashboardTexture.magFilter = THREE.LinearFilter;
        
        // Screen with dashboard
        const screenGeometry = new THREE.PlaneGeometry(screenWidth, screenHeight);
        const screenMaterial = new THREE.MeshBasicMaterial({
            map: dashboardTexture,
            toneMapped: false
        });
        const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
        screenMesh.position.z = phoneDepth / 2 + 0.001;
        phoneGroup.add(screenMesh);
        
        // Notch (Dynamic Island)
        const notchGeometry = new THREE.BoxGeometry(0.4, 0.12, 0.02);
        const notchMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const notchMesh = new THREE.Mesh(notchGeometry, notchMaterial);
        notchMesh.position.set(0, phoneHeight / 2 - 0.3, phoneDepth / 2 + 0.002);
        phoneGroup.add(notchMesh);
        
        // Camera lens (back)
        const lensGeometry = new THREE.CircleGeometry(0.15, 32);
        const lensMaterial = new THREE.MeshStandardMaterial({
            color: 0x2a2a2a,
            metalness: 0.9,
            roughness: 0.1
        });
        const lensMesh = new THREE.Mesh(lensGeometry, lensMaterial);
        lensMesh.position.set(-0.5, phoneHeight / 2 - 0.5, -phoneDepth / 2 - 0.001);
        lensMesh.rotation.y = Math.PI;
        phoneGroup.add(lensMesh);
        
        // Initial rotation
        phoneGroup.rotation.x = 0;
        phoneGroup.rotation.y = 0;
        
        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        
        container.addEventListener('mousemove', (event) => {
            const rect = container.getBoundingClientRect();
            mouseX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouseY = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            // Limited tilt range (±17 degrees)
            targetRotationY = mouseX * 0.3;
            targetRotationX = mouseY * 0.3;
        });
        
        container.addEventListener('mouseleave', () => {
            targetRotationX = 0;
            targetRotationY = 0;
        });
        
        // Animation loop
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Smooth interpolation
            currentRotationX += (targetRotationX - currentRotationX) * 0.1;
            currentRotationY += (targetRotationY - currentRotationY) * 0.1;
            
            phoneGroup.rotation.x = currentRotationX;
            phoneGroup.rotation.y = currentRotationY;
            
            // Subtle floating animation
            phoneGroup.position.y = Math.sin(time * 0.5) * 0.05;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
}

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting && !window.sceneInitialized) {
            window.sceneInitialized = true;
            init3DScene();
            observer.disconnect();
        }
    });
}, { threshold: 0.1 });

observer.observe(document.getElementById('canvas-container'));
})();
    </script>
</body>
</html>
