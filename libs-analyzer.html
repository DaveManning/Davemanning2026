<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBS Handheld Analyzer - Making Origin Visible</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: transparent;
            font-family: 'Courier New', monospace;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #tagline {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            text-shadow: 
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6),
                0 0 30px rgba(0, 255, 255, 0.4);
            transition: opacity 1s ease;
        }
        
        #tagline.visible {
            opacity: 1;
        }
        
        .hud-overlay {
            position: absolute;
            color: #00ffff;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.8);
        }
        
        .hud-overlay.visible {
            opacity: 0.9;
        }
        
        #spectral-data {
            top: 20px;
            left: 20px;
        }
        
        #provenance-data {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        
        #impact-metrics {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="tagline">MAKING ORIGIN VISIBLE</div>
    
    <div id="spectral-data" class="hud-overlay">
        <div>SPECTRAL ANALYSIS</div>
        <div>Ta (Tantalum): 489.2 nm</div>
        <div>Nb (Niobium): 405.9 nm</div>
        <div>Fe (Iron): 371.9 nm</div>
    </div>
    
    <div id="provenance-data" class="hud-overlay">
        <div>ORIGIN: DRC - Rubaya, North Kivu</div>
        <div>CONFIDENCE: 98.7%</div>
        <div>STATUS: ✓ CERTIFIED</div>
    </div>
    
    <div id="impact-metrics" class="hud-overlay">
        <div>98% ADOPTION RATE • FULL DODD-FRANK COMPLIANCE • 2-YEAR DEPLOYMENT</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(
            50,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Lighting - sci-fi dramatic
        const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.4);
        scene.add(ambientLight);
        
        // Key light (cyan sci-fi)
        const keyLight = new THREE.DirectionalLight(0x00ffff, 0.8);
        keyLight.position.set(5, 5, 5);
        scene.add(keyLight);
        
        // Rim light (purple)
        const rimLight = new THREE.PointLight(0x9d4edd, 0.6);
        rimLight.position.set(-5, 3, -3);
        scene.add(rimLight);
        
        // Bottom fill (amber)
        const fillLight = new THREE.PointLight(0xff9500, 0.3);
        fillLight.position.set(0, -2, 2);
        scene.add(fillLight);
        
        // LIBS Device group
        const deviceGroup = new THREE.Group();
        scene.add(deviceGroup);
        
        // Load LIBS handheld device
        // IMPORTANT: Replace with your hosted GLB URL
        const loader = new THREE.GLTFLoader();
        let deviceModel = null;
        
        loader.load(
            'https://your-domain.com/handheld.glb',
            function (gltf) {
                deviceModel = gltf.scene;
                
                // Scale and position
                const box = new THREE.Box3().setFromObject(deviceModel);
                const size = box.getSize(new THREE.Vector3());
                const scale = 3 / Math.max(size.x, size.y, size.z);
                deviceModel.scale.multiplyScalar(scale);
                
                // Center it
                const center = box.getCenter(new THREE.Vector3());
                deviceModel.position.sub(center.multiplyScalar(scale));
                
                deviceGroup.add(deviceModel);
            },
            undefined,
            function (error) {
                console.error('Error loading LIBS device:', error);
                // Create placeholder if model fails to load
                const geometry = new THREE.BoxGeometry(1, 2, 0.5);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x2a2a3e,
                    metalness: 0.7,
                    roughness: 0.3
                });
                const placeholder = new THREE.Mesh(geometry, material);
                deviceGroup.add(placeholder);
            }
        );
        
        // Particle system for electron plume
        const particleCount = 3000;
        const particles = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const velocities = [];
        const lifetimes = [];
        
        // Spectral colors (element signatures)
        const spectralColors = [
            new THREE.Color(0x00ffff), // Tantalum - cyan
            new THREE.Color(0x9d4edd), // Niobium - purple
            new THREE.Color(0x10b981), // Mixed - green
            new THREE.Color(0xff9500), // Iron - orange
        ];
        
        for (let i = 0; i < particleCount; i++) {
            // Start at laser impact point (below device)
            positions[i * 3] = 0;
            positions[i * 3 + 1] = -1;
            positions[i * 3 + 2] = 0;
            
            // Random spectral color
            const color = spectralColors[Math.floor(Math.random() * spectralColors.length)];
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
            
            // Upward cone velocity (electron plume physics)
            const angle = Math.random() * Math.PI * 2;
            const spread = 0.3 + Math.random() * 0.4;
            velocities.push({
                x: Math.cos(angle) * spread,
                y: 2 + Math.random() * 3, // Upward bias
                z: Math.sin(angle) * spread
            });
            
            lifetimes.push(Math.random());
        }
        
        particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const particleSystem = new THREE.Points(particles, particleMaterial);
        particleSystem.visible = false;
        scene.add(particleSystem);
        
        // Laser beam
        const beamGeometry = new THREE.CylinderGeometry(0.02, 0.02, 2, 8);
        const beamMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0,
            emissive: 0x00ffff,
            emissiveIntensity: 2
        });
        const laserBeam = new THREE.Mesh(beamGeometry, beamMaterial);
        laserBeam.position.y = 0;
        deviceGroup.add(laserBeam);
        
        // State management
        let mouseY = 0;
        let mouseX = 0;
        let laserActive = false;
        let plumeActive = false;
        let analysisComplete = false;
        let time = 0;
        
        // Mouse interaction
        container.addEventListener('mousemove', (event) => {
            const rect = container.getBoundingClientRect();
            mouseX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouseY = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            // Y-axis triggers laser
            if (mouseY > 0.3 && !laserActive) {
                activateLaser();
            }
        });
        
        container.addEventListener('mouseleave', () => {
            deactivateLaser();
        });
        
        function activateLaser() {
            laserActive = true;
            beamMaterial.opacity = 0.8;
            
            setTimeout(() => {
                plumeActive = true;
                particleSystem.visible = true;
                
                // Show tagline
                document.getElementById('tagline').classList.add('visible');
                
                setTimeout(() => {
                    analysisComplete = true;
                    document.querySelectorAll('.hud-overlay').forEach(el => {
                        el.classList.add('visible');
                    });
                }, 2000);
            }, 500);
        }
        
        function deactivateLaser() {
            laserActive = false;
            beamMaterial.opacity = 0;
            plumeActive = false;
            analysisComplete = false;
            
            setTimeout(() => {
                particleSystem.visible = false;
                document.getElementById('tagline').classList.remove('visible');
                document.querySelectorAll('.hud-overlay').forEach(el => {
                    el.classList.remove('visible');
                });
                
                // Reset particles
                const positions = particles.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] = 0;
                    positions[i * 3 + 1] = -1;
                    positions[i * 3 + 2] = 0;
                    lifetimes[i] = Math.random();
                }
                particles.attributes.position.needsUpdate = true;
            }, 1000);
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Rotate device gently
            deviceGroup.rotation.y = Math.sin(time * 0.3) * 0.3 + mouseX * 0.5;
            deviceGroup.rotation.x = Math.cos(time * 0.2) * 0.1;
            
            // Floating animation
            deviceGroup.position.y = Math.sin(time) * 0.1;
            
            // Update electron plume particles
            if (plumeActive) {
                const positions = particles.attributes.position.array;
                
                for (let i = 0; i < particleCount; i++) {
                    lifetimes[i] += 0.01;
                    
                    if (lifetimes[i] > 1) {
                        // Reset particle at emission point
                        positions[i * 3] = (Math.random() - 0.5) * 0.2;
                        positions[i * 3 + 1] = -1;
                        positions[i * 3 + 2] = (Math.random() - 0.5) * 0.2;
                        lifetimes[i] = 0;
                    } else {
                        // Update position based on velocity
                        positions[i * 3] += velocities[i].x * 0.02;
                        positions[i * 3 + 1] += velocities[i].y * 0.02;
                        positions[i * 3 + 2] += velocities[i].z * 0.02;
                        
                        // Add turbulence (plasma dynamics)
                        positions[i * 3] += (Math.random() - 0.5) * 0.01;
                        positions[i * 3 + 2] += (Math.random() - 0.5) * 0.01;
                    }
                }
                
                particles.attributes.position.needsUpdate = true;
            }
            
            // Pulse laser beam
            if (laserActive) {
                beamMaterial.opacity = 0.6 + Math.sin(time * 10) * 0.2;
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
